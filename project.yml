name: SynologyPhotosManager

options:
  bundleIdPrefix: com.hyeonm9
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  # Shared transport/security core, a sibling package used by both this app and
  # SynologyMonitor (see ../SynoKit/README.md). Xcode resolves it on open.
  SynoKit:
    path: ../SynoKit
  # Synology Photos models + service (this app only), built on SynoKit.
  FotoKit:
    path: FotoKit

targets:
  SynologyPhotosManager:
    type: application
    platform: macOS
    sources:
      - path: App
    dependencies:
      - package: SynoKit
        product: SynoKit
      - package: FotoKit
        product: FotoKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hyeonm9.SynologyPhotosManager
        PRODUCT_NAME: SynologyPhotosManager
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "같은 네트워크의 Synology NAS를 자동으로 찾기 위해 로컬 네트워크를 사용합니다."
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_ENTITLEMENTS: App/SynologyPhotosManager.entitlements
        CODE_SIGN_STYLE: Automatic
        # Pin the Personal Team so EVERY build (Xcode or bare xcodebuild) is
        # team-signed, not ad-hoc "Sign to Run Locally". A stable code identity
        # keeps the macOS Local Network permission from desyncing on each rebuild
        # (the recurring -1009 trap). Never let this fall back to empty/ad-hoc.
        DEVELOPMENT_TEAM: 8MC7H99NUM
        ENABLE_HARDENED_RUNTIME: YES
        # Language mode 5 for now (matches SynoKit); Swift 6 strict-concurrency
        # migration is a tracked follow-up.
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  SynologyPhotosManager:
    build:
      targets:
        SynologyPhotosManager: all
    run:
      config: Debug
